[package]
name = "windows_syscall"
version = "0.1.0"
authors = ["MaiOS Contributors"]
description = "Windows NT syscall translation layer - maps NT ABI numbers to MaiOS unified syscall table"
edition = "2021"

[dependencies]
log = "0.4.8"

[target.'cfg(target_arch = "x86_64")'.dependencies]
maios_syscall = { path = "../maios_syscall" }
kernel_config = { path = "../kernel_config" }
spin = "0.9.4"
task = { path = "../task" }
spawn = { path = "../spawn" }
scheduler = { path = "../scheduler" }
sleep = { path = "../sleep" }

[lib]
crate-type = ["rlib"]
