[package]
name = "windows_syscall"
version = "0.1.0"
authors = ["MaiOS Contributors"]
description = "Windows NT syscall compatibility layer for MaiOS - implements Windows ABI syscalls natively"
edition = "2021"

[dependencies]
log = "0.4.8"

[target.'cfg(target_arch = "x86_64")'.dependencies]
memory = { path = "../memory" }
task = { path = "../task" }
app_io = { path = "../app_io" }
spin = "0.9.4"

[lib]
crate-type = ["rlib"]
