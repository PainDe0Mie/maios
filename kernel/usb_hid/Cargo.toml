[package]
name = "usb_hid"
version = "0.1.0"
authors = ["MaiOS Contributors"]
description = "USB HID driver: bridges XHCI enumerated HID devices to the keyboard/gamepad event pipeline"
edition = "2021"

[dependencies]
log = "0.4.8"
spin = "0.9.4"
mpmc = "0.1.6"

[dependencies.keycodes_ascii]
path = "../../libs/keycodes_ascii"

[dependencies.event_types]
path = "../event_types"

[dependencies.xhci]
path = "../xhci"

[dependencies.sleep]
path = "../sleep"

[dependencies.spawn]
path = "../spawn"

[dependencies.task]
path = "../task"

[lib]
crate-type = ["rlib"]
