name: Build MaiOS

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    types: [synchronize, opened, reopened]

# Cancel previous runs on the same branch (but never cancel tag builds)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc nasm pkg-config grub-pc-bin mtools xorriso qemu-system-x86

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build ISO
        run: make iso

      - name: Rename ISO to MaiOS.iso
        run: mv build/MaiOS.iso MaiOS.iso 2>/dev/null || mv build/theseus-*.iso MaiOS.iso

      - name: Upload unstable artifact (commits)
        # Upload on every push commit — kept for 5 days to save storage.
        # GitHub Actions free tier: 500 MB artifact storage, 2000 min/month.
        # With cancel-in-progress + 5-day retention, this stays well within limits
        # even with frequent commits.
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: MaiOS-unstable-${{ github.sha }}
          path: MaiOS.iso
          retention-days: 5
          compression-level: 0  # ISO is already compressed

      - name: Upload stable artifact (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: MaiOS-${{ github.ref_name }}-stable
          path: MaiOS.iso
          retention-days: 90

  # Create a GitHub Release with the .iso attached on version tags
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download stable artifact
        uses: actions/download-artifact@v4
        with:
          name: MaiOS-${{ github.ref_name }}-stable

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MaiOS ${{ github.ref_name }} (stable)
          files: MaiOS.iso
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
